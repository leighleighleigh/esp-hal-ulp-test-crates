[package]
name = "ulp-baremetal"
version = "0.1.0"
edition = "2024"
rust-version = "1.88.0"

[[bin]]
path = "src/main.rs"
name = "app"
test = false
bench = false

[dependencies]
cfg-if = "1"
embedded-hal = "1.0.0"
panic-halt = "1.0.0"

# riscv-rt TODOs
# 1. Need to place _start_trap at 0x10, and add the picorv32 interrupt handling code,
#    which should jump to further interrupt handling mechanisms provided by riscv-rt.
# 2. Need to add the custom picorv32 assembly instructions somewhere, probably to a library module.
riscv-rt = { version = "0.17.1", features = ["memory", "no-mhartid", "no-xie-xip", "no-xtvec", "single-hart"] }

[features]
default = [] # Setting this may cause build issues, when using the justfile. For VSCode usage, set this in settings.json.

[profile.release]
debug = false
strip = "debuginfo"
# size is an important factor in the ULP code,  because it's easy to run out of space.
opt-level = "s" 
codegen-units = 1 # LLVM can perform better optimizations using a single thread
# Enabling LTO breaks the weak linkage used for the ulp_irq_handler function...
# https://github.com/riscvarchive/riscv-gcc/issues/172
lto = true

