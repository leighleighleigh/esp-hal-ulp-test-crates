[package]
name = "ulp-baremetal"
version = "0.1.0"
edition = "2024"
rust-version = "1.88.0"

[[bin]]
path = "src/main.rs"
name = "app"
test = false
bench = false

[dependencies]
cfg-if = "1"
embedded-hal = "1.0.0"
panic-halt = "1.0.0"

# riscv-rt TODOs for adapting esp-lp-hal
# 1. Check that the overriden _setup_interrupt and _start_trap functions work, 
#    with the interrupt/exception handling hooks provided by riscv-rt.
# 2. Add the custom picorv32 assembly instructions somewhere, exported as inlined rust functions
# 3. Add a critical section implementation
# riscv-rt = { version = "0.17.1", features = ["no-mhartid", "no-xie-xip", "no-xtvec", "single-hart"] }

# The 'entry' procmacro from esp-hal-procmacros is still used,
# as it handles argument type passing between HP & LP cores using the 
# __ULP_MAGIC_ symbol name :)
# esp-hal-procmacros = { version = "0.21.0", features = ["is-ulp-core"] }
esp-hal-procmacros = { version = "0.21.0", features = ["is-ulp-core"], path = "/home/leigh/Git/esp-hal/esp-hal-procmacros" }

# LP HAL from esp-hal, needed by esp-hal-procmacros,
# so that it can conjure the peripherals passed to main()
# esp-lp-hal = { version = "0.3.0", features = [ "esp32s3" ], git = "https://github.com/esp-rs/esp-hal", rev = "6ba09ad" }
esp-lp-hal = { version = "0.3.0", features = [ "esp32s3" ], path = "/home/leigh/Git/esp-hal/esp-lp-hal"}

[features]
default = [] # Setting this may cause build issues, when using the justfile. For VSCode usage, set this in settings.json.

[profile.release]
debug = false
strip = "debuginfo"
# size is an important factor in the ULP code,  because it's easy to run out of space.
#opt-level = "s" 
opt-level = 1
codegen-units = 1 # LLVM can perform better optimizations using a single thread
# Enabling LTO breaks the weak linkage used for the ulp_irq_handler function...
# https://github.com/riscvarchive/riscv-gcc/issues/172
lto = false

