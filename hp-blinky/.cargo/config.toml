[alias]
esp32c6 = "build --release --no-default-features --features=esp32c6 --target riscv32imac-unknown-none-elf"
esp32s2 = "build --release --no-default-features --features=esp32s2 --target xtensa-esp32s2-none-elf"
esp32s3 = "build --release --no-default-features --features=esp32s3 --target xtensa-esp32s3-none-elf"

[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor --chip esp32s3"

[target.xtensa-esp32s2-none-elf]
runner = "espflash flash --monitor --chip esp32s2"

[target.'cfg(target_arch = "riscv32")']
rustflags = [
  "-C", "link-arg=-Tlink.x",
]

[target.'cfg(target_arch = "xtensa")']
rustflags = [
  "-C", "link-arg=-nostartfiles",
]

[unstable]
build-std = ["core"]

[env]
ESP_LOG="info"
